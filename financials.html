<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spencer's Masonry - Financials</title>
    <style>
        :root {
            --bg-primary: #1a1a1a;
            --bg-secondary: #2d2d2d;
            --bg-tertiary: #353535;
            --bg-input: #1a1a1a;
            --border-color: #3d3d3d;
            --border-hover: #525252;
            --text-primary: #ffffff;
            --text-secondary: #999999;
            --text-muted: #666666;
            --accent: #f97316;
            --accent-hover: #ea580c;
            --success: #16a34a;
            --danger: #dc2626;
            --card-shadow: rgba(0,0,0,0.3);
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #ffffff;
            --bg-tertiary: #fafafa;
            --bg-input: #ffffff;
            --border-color: #e0e0e0;
            --border-hover: #d0d0d0;
            --text-primary: #1a1a1a;
            --text-secondary: #666666;
            --text-muted: #999999;
            --card-shadow: rgba(0,0,0,0.1);
        }

        .theme-toggle { position: fixed; bottom: 20px; right: 20px; background: var(--bg-secondary); border: 1px solid var(--border-color); color: var(--text-primary); width: 44px; height: 44px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; z-index: 100; transition: all 0.2s; box-shadow: 0 2px 10px var(--card-shadow); }
        .theme-toggle:hover { border-color: var(--accent); transform: scale(1.1); }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
        }

        .header {
            background: #f97316;
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .header h1 { font-size: 1.1rem; color: white; }

        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: 600; cursor: pointer;
            transition: all 0.2s; text-decoration: none;
        }
        .btn-back { background: rgba(255,255,255,0.2); color: white; padding: 8px 16px; font-size: 0.85rem; }
        .btn-back:hover { background: rgba(255,255,255,0.3); }

        .main-content { padding: 24px; max-width: 1200px; margin: 0 auto; }

        /* Toggle */
        .basis-toggle {
            display: flex; gap: 4px; background: var(--bg-secondary);
            border-radius: 10px; padding: 4px; border: 1px solid var(--border-color);
            width: fit-content;
        }
        .basis-btn {
            padding: 8px 20px; border: none; border-radius: 8px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer;
            background: transparent; color: var(--text-secondary);
            transition: all 0.2s;
        }
        .basis-btn.active { background: var(--accent); color: white; }
        .basis-btn:hover:not(.active) { color: var(--text-primary); }

        /* Top bar */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: 12px; margin-bottom: 24px;
        }
        .top-bar h2 { font-size: 1.2rem; color: var(--accent); }

        /* Summary cards */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px; margin-bottom: 24px;
        }
        .summary-card {
            background: var(--bg-secondary); padding: 20px;
            border-radius: 12px; border: 1px solid var(--border-color);
        }
        .summary-card .label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .summary-card .value { font-size: 1.5rem; font-weight: 700; }
        .summary-card .value.green { color: #16a34a; }
        .summary-card .value.orange { color: var(--accent); }
        .summary-card .value.red { color: #dc2626; }
        .summary-card .value.blue { color: #3b82f6; }
        .summary-card .sub { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }

        /* Section */
        .section {
            background: var(--bg-secondary); border-radius: 12px;
            border: 1px solid var(--border-color); margin-bottom: 24px; overflow: hidden;
        }
        .section-header {
            padding: 14px 20px; background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
        }
        .section-header h3 { font-size: 1rem; color: var(--accent); }
        .section-body { padding: 20px; }

        /* P&L Table */
        .pl-table { width: 100%; border-collapse: collapse; }
        .pl-table tr { border-bottom: 1px solid var(--border-color); }
        .pl-table tr:last-child { border-bottom: none; }
        .pl-table td { padding: 10px 0; font-size: 0.9rem; }
        .pl-table td:first-child { color: var(--text-secondary); }
        .pl-table td:last-child { text-align: right; font-weight: 600; font-family: 'Courier New', monospace; }
        .pl-table tr.subtotal { border-top: 2px solid var(--border-color); }
        .pl-table tr.subtotal td { font-weight: 700; padding-top: 14px; }
        .pl-table tr.subtotal td:first-child { color: var(--text-primary); }
        .pl-table tr.total { border-top: 3px solid var(--accent); background: var(--bg-tertiary); }
        .pl-table tr.total td { font-weight: 700; font-size: 1rem; padding: 14px 0; }
        .pl-table tr.total td:first-child { color: var(--accent); padding-left: 8px; }
        .pl-table tr.total td:last-child { padding-right: 8px; }
        .pl-table tr.indent td:first-child { padding-left: 20px; font-size: 0.85rem; }
        .pl-table .positive { color: #16a34a; }
        .pl-table .negative { color: #dc2626; }

        /* Monthly breakdown */
        .monthly-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        .month-card {
            background: var(--bg-primary); border-radius: 8px;
            padding: 14px; border: 1px solid var(--border-color);
        }
        .month-card .month-name { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; font-weight: 600; }
        .month-card .month-revenue { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
        .month-card .month-costs { font-size: 0.8rem; color: var(--text-muted); }
        .month-card .month-profit { font-size: 0.85rem; font-weight: 700; margin-top: 4px; }

        /* Profit bar */
        .profit-bar-container { margin-top: 4px; }
        .profit-bar-bg { height: 4px; background: var(--border-color); border-radius: 2px; overflow: hidden; }
        .profit-bar-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }

        .loading-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: var(--bg-primary); display: flex; align-items: center;
            justify-content: center; z-index: 300;
        }
        .loading-overlay.hidden { display: none; }
        .loading-text { color: var(--accent); font-size: 1.2rem; }

        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #16a34a; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; opacity: 0; transition: opacity 0.3s; z-index: 200; }
        .toast.show { opacity: 1; }

        /* Copy btn */
        .btn-sm { padding: 6px 12px; font-size: 0.8rem; }
        .btn-secondary { background: var(--border-color); color: var(--text-primary); }
        .btn-secondary:hover { background: #525252; }
        .btn-success { background: #16a34a; color: white; }
        .btn-success:hover { background: #15803d; }

        @media (max-width: 768px) {
            .main-content { padding: 16px; }
            .summary-row { grid-template-columns: repeat(2, 1fr); }
            .monthly-grid { grid-template-columns: repeat(2, 1fr); }
            .top-bar { flex-direction: column; align-items: flex-start; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">☀️</button>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-text">Loading financials...</div>
    </div>

    <div class="header">
        <div class="header-left">
            <a href="index.html" class="btn btn-back">← Home</a>
            <h1>💰 Financials</h1>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h2>Profit & Loss</h2>
            <div class="basis-toggle">
                <button class="basis-btn active" id="btnCash" onclick="setBasis('cash')">Cash</button>
                <button class="basis-btn" id="btnAccrual" onclick="setBasis('accrual')">Accrual</button>
            </div>
        </div>

        <div class="summary-row" id="summaryCards">
            <div class="summary-card">
                <div class="label">Revenue</div>
                <div class="value green" id="totalRevenue">$0</div>
                <div class="sub" id="revenueJobs">0 jobs</div>
            </div>
            <div class="summary-card">
                <div class="label">Total Costs</div>
                <div class="value orange" id="totalCosts">$0</div>
                <div class="sub" id="costBreakdown">Labor + Machines + Materials</div>
            </div>
            <div class="summary-card">
                <div class="label">Gross Profit</div>
                <div class="value" id="grossProfit">$0</div>
                <div class="sub" id="grossMargin">0% margin</div>
            </div>
            <div class="summary-card">
                <div class="label">Outstanding</div>
                <div class="value blue" id="totalOutstanding">$0</div>
                <div class="sub" id="outstandingSub">Owed / Remaining</div>
            </div>
        </div>

        <!-- P&L Detail -->
        <div class="section">
            <div class="section-header">
                <h3>Profit & Loss Detail</h3>
                <button class="btn btn-secondary btn-sm" onclick="copyPL()">📋 Copy</button>
            </div>
            <div class="section-body">
                <table class="pl-table" id="plTable">
                    <tbody id="plBody"></tbody>
                </table>
            </div>
        </div>

        <!-- Monthly Breakdown -->
        <div class="section">
            <div class="section-header">
                <h3>Monthly Breakdown</h3>
            </div>
            <div class="section-body">
                <div class="monthly-grid" id="monthlyGrid"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">Copied!</div>

    <script>
        const JSONBIN_BIN_ID = '697a7070d0ea881f408e6063';
        const JSONBIN_API_KEY = '$2a$10$vgUvy.chZeKckQe2eTD36uOX/mfrhx8GKudyoZqZsjWkbtaam8/Nm';

        let allData = {};
        let basis = 'cash'; // 'cash' or 'accrual'
        let machines = [];

        // Default rates as fallback
        const defaultWorkerRates = {
            'Jordan': 120, 'Kamalei': 100, 'Dave': 114, 'Joe': 114,
            'Ian': 100, 'Ray': 100, 'Jestin': 63, 'Duke': 58,
            'Keahi': 52, 'Ruben': 52, 'Beau': 87.5, 'Seth': 40, 'Kawika': 35
        };

        const defaultMachineRates = {
            'TL12': 200, '290 Excavator': 290, '290 Skid': 200, '145 Mini Ex': 195,
            '240 Skid': 180, '197 Skid': 200, 'Masons': 900, 'Pump': 500,
            '450 Truck': 200, '650 Truck': 900, '750 Truck': 650
        };

        async function loadAllData() {
            try {
                const response = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
                    headers: { 'X-Access-Key': JSONBIN_API_KEY }
                });
                const data = await response.json();
                allData = data.record || {};
                if (!allData.jobs) allData.jobs = {};
                if (!allData.employees) allData.employees = {};
                buildMachinesList();
                render();
                document.getElementById('loadingOverlay').classList.add('hidden');
            } catch (e) {
                console.error('Load error:', e);
                allData = { jobs: {}, employees: {} };
                document.getElementById('loadingOverlay').classList.add('hidden');
            }
        }

        function buildMachinesList() {
            machines = [];
            if (allData.machines) {
                machines = Object.values(allData.machines)
                    .filter(m => m.status === 'active')
                    .sort((a, b) => (a.sortOrder || 999) - (b.sortOrder || 999));
            }
        }

        function getWorkerRate(workerName, job) {
            if (job && job.workerRates && job.workerRates[workerName] !== undefined) {
                return job.workerRates[workerName];
            }
            if (allData.employees) {
                const emp = Object.values(allData.employees).find(e => e.name === workerName);
                if (emp) return emp.rate || 0;
            }
            return defaultWorkerRates[workerName] || 0;
        }

        function getMachineRate(machineName, job) {
            if (job && job.machineRates && job.machineRates[machineName] !== undefined) {
                return job.machineRates[machineName];
            }
            const m = machines.find(e => (e.payrollName || e.name) === machineName);
            if (m) return m.rate || 0;
            return defaultMachineRates[machineName] || 0;
        }

        function fmtMoney(n) {
            return '$' + Number(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // ============================================
        // CALCULATE JOB FINANCIALS
        // ============================================
        function getJobFinancials(job) {
            const payrollName = job.payrollName || job.name;
            const payrollKey = payrollName.replace(/[^a-zA-Z]/g, '');
            const eqPrefix = payrollKey + '_eq_';
            const isCash = job.isCash || false;

            let payrollLabor = 0;
            let payrollMachines = 0;
            const monthlyDraws = {};

            // Scan payroll weeks
            Object.keys(allData).forEach(key => {
                if (!key.match(/^\d{4}-\d{2}-\d{2}$/) || key === 'jobs') return;
                const weekData = allData[key];
                Object.entries(weekData).forEach(([dayKey, dayData]) => {
                    if (typeof dayData !== 'object') return;
                    Object.entries(dayData).forEach(([inputId, hours]) => {
                        if (inputId.startsWith(payrollKey + '_') && !inputId.includes('_eq_')) {
                            const workerName = inputId.split('_').pop();
                            payrollLabor += hours * getWorkerRate(workerName, job);
                        }
                        if (inputId.startsWith(eqPrefix)) {
                            const machineKey = inputId.split('_eq_')[1];
                            const machine = machines.find(m => (m.payrollName || m.name).replace(/[^a-zA-Z0-9]/g, '') === machineKey);
                            const machineName = machine ? (machine.payrollName || machine.name) : machineKey;
                            payrollMachines += hours * getMachineRate(machineName, job);
                        }
                    });
                });
            });

            const additionalLabor = (job.additionalLabor || []).reduce((s, i) => s + (i.amount || 0), 0);
            let additionalMachines = 0;
            if (job.equipment) {
                Object.entries(job.equipment).forEach(([machineName, hours]) => {
                    additionalMachines += (hours || 0) * getMachineRate(machineName, job);
                });
            }
            const materialsTotal = (job.materials || []).reduce((s, i) => s + (i.amount || 0), 0);

            const totalLabor = payrollLabor + additionalLabor;
            const totalMachines = payrollMachines + additionalMachines;
            const directCosts = totalLabor + totalMachines + materialsTotal;

            const overhead = directCosts * ((job.overheadPercent || 18) / 100);
            const afterOverhead = directCosts + overhead;
            const profit = isCash ? 0 : afterOverhead * ((job.profitPercent || 10) / 100);
            const afterProfit = afterOverhead + profit;
            const geTax = isCash ? 0 : afterProfit * ((job.geTaxPercent || 4.712) / 100);
            const jobTotal = isCash ? afterOverhead : afterProfit + geTax;

            const totalDraws = (job.draws || []).reduce((s, d) => s + (d.amount || 0), 0);

            // Monthly draws
            (job.draws || []).forEach(d => {
                if (d.date && d.amount) {
                    const monthKey = d.date.substring(0, 7); // YYYY-MM
                    monthlyDraws[monthKey] = (monthlyDraws[monthKey] || 0) + d.amount;
                }
            });

            // Accrual revenue
            let accrualRevenue;
            if (job.jobType === 'contract' && job.contractAmount > 0) {
                // % complete = costs / contract amount, capped at 100%
                const pctComplete = Math.min(directCosts / job.contractAmount, 1);
                accrualRevenue = job.contractAmount * pctComplete;
            } else {
                // Hourly: revenue = cost × 1.18
                accrualRevenue = directCosts * 1.18;
            }

            return {
                name: job.name,
                id: job.id,
                status: job.status,
                jobType: job.jobType || 'hourly',
                isCash: isCash,
                contractAmount: job.contractAmount || 0,
                payrollLabor,
                additionalLabor,
                totalLabor,
                payrollMachines,
                additionalMachines,
                totalMachines,
                materialsTotal,
                directCosts,
                overhead,
                profit,
                geTax,
                jobTotal,
                totalDraws,
                accrualRevenue,
                monthlyDraws
            };
        }

        // ============================================
        // RENDER
        // ============================================
        function render() {
            const jobs = Object.values(allData.jobs || {});
            // Include active + completed (exclude bidding/on-hold from P&L)
            const relevantJobs = jobs.filter(j => j.status === 'active' || j.status === 'completed' || (j.isCash && j.status !== 'completed'));

            const financials = relevantJobs.map(getJobFinancials);

            let totalRevenue = 0;
            let totalLabor = 0;
            let totalMachines = 0;
            let totalMaterials = 0;
            let totalOverhead = 0;
            let totalProfit = 0;
            let totalGeTax = 0;
            let totalDirectCosts = 0;
            let totalOutstanding = 0;
            const monthlyData = {};

            financials.forEach(f => {
                const rev = basis === 'cash' ? f.totalDraws : f.accrualRevenue;
                totalRevenue += rev;
                totalLabor += f.totalLabor;
                totalMachines += f.totalMachines;
                totalMaterials += f.materialsTotal;
                totalOverhead += f.overhead;
                totalProfit += f.profit;
                totalGeTax += f.geTax;
                totalDirectCosts += f.directCosts;

                // Outstanding: for cash basis = jobTotal - draws, for accrual = accrualRevenue - draws
                if (basis === 'cash') {
                    totalOutstanding += Math.max(0, f.jobTotal - f.totalDraws);
                } else {
                    totalOutstanding += Math.max(0, f.accrualRevenue - f.totalDraws);
                }

                // Monthly aggregation
                if (basis === 'cash') {
                    Object.entries(f.monthlyDraws).forEach(([month, amt]) => {
                        if (!monthlyData[month]) monthlyData[month] = { revenue: 0, costs: 0 };
                        monthlyData[month].revenue += amt;
                    });
                }
            });

            const grossProfitVal = totalRevenue - totalDirectCosts;
            const grossMarginPct = totalRevenue > 0 ? ((grossProfitVal / totalRevenue) * 100).toFixed(1) : 0;

            // Summary cards
            document.getElementById('totalRevenue').textContent = fmtMoney(totalRevenue);
            document.getElementById('revenueJobs').textContent = `${financials.length} jobs (${basis} basis)`;
            document.getElementById('totalCosts').textContent = fmtMoney(totalDirectCosts);
            document.getElementById('grossProfit').textContent = fmtMoney(grossProfitVal);
            document.getElementById('grossProfit').className = 'value ' + (grossProfitVal >= 0 ? 'green' : 'red');
            document.getElementById('grossMargin').textContent = `${grossMarginPct}% margin`;
            document.getElementById('totalOutstanding').textContent = fmtMoney(totalOutstanding);
            document.getElementById('outstandingSub').textContent = basis === 'cash' ? 'Billed but not collected' : 'Earned but not collected';

            // P&L Table
            const plBody = document.getElementById('plBody');
            let rows = '';

            rows += plRow('Revenue', fmtMoney(totalRevenue), '');
            rows += plRow('', '', '', 'spacer');

            rows += plRow('Cost of Services', '', '', 'section-label');
            rows += plRow('Payroll Labor', fmtMoney(financials.reduce((s, f) => s + f.payrollLabor, 0)), 'indent');
            rows += plRow('Additional Labor', fmtMoney(financials.reduce((s, f) => s + f.additionalLabor, 0)), 'indent');
            rows += plRow('Payroll Machines', fmtMoney(financials.reduce((s, f) => s + f.payrollMachines, 0)), 'indent');
            rows += plRow('Additional Machines', fmtMoney(financials.reduce((s, f) => s + f.additionalMachines, 0)), 'indent');
            rows += plRow('Materials', fmtMoney(totalMaterials), 'indent');
            rows += plRow('Total Direct Costs', fmtMoney(totalDirectCosts), '', 'subtotal');
            rows += plRow('', '', '', 'spacer');

            rows += plRow('Gross Profit', fmtMoney(grossProfitVal), grossProfitVal >= 0 ? 'positive' : 'negative', 'subtotal');
            rows += plRow('Gross Margin', grossMarginPct + '%', '', '');
            rows += plRow('', '', '', 'spacer');

            rows += plRow('Markups Applied', '', '', 'section-label');
            rows += plRow('Overhead (18%)', fmtMoney(totalOverhead), 'indent');
            rows += plRow('Profit Markup (10%)', fmtMoney(totalProfit), 'indent');
            rows += plRow('GE Tax (4.712%)', fmtMoney(totalGeTax), 'indent');
            rows += plRow('', '', '', 'spacer');

            const totalBilled = financials.reduce((s, f) => s + f.jobTotal, 0);
            const totalCollected = financials.reduce((s, f) => s + f.totalDraws, 0);
            rows += plRow('Total Billed (all jobs)', fmtMoney(totalBilled), '', 'subtotal');
            rows += plRow('Total Collected (draws)', fmtMoney(totalCollected), '');
            rows += plRow('Outstanding', fmtMoney(totalBilled - totalCollected), (totalBilled - totalCollected) > 0 ? 'negative' : 'positive', 'total');

            plBody.innerHTML = rows;

            // Monthly breakdown
            renderMonthly(financials);
        }

        function plRow(label, value, valueClass, rowClass) {
            if (rowClass === 'spacer') return '<tr style="border:none;"><td colspan="2" style="padding:6px 0;"></td></tr>';
            if (rowClass === 'section-label') return `<tr style="border:none;"><td colspan="2" style="padding:8px 0 4px; font-weight:700; color:var(--text-primary); font-size:0.9rem;">${label}</td></tr>`;
            const cls = rowClass ? ` class="${rowClass}"` : '';
            const valCls = valueClass ? ` class="${valueClass}"` : '';
            return `<tr${cls}><td>${label}</td><td${valCls}>${value}</td></tr>`;
        }

        function renderMonthly(financials) {
            const grid = document.getElementById('monthlyGrid');
            const monthlyData = {};

            // Aggregate monthly by draws (cash) or by payroll week (accrual approximation)
            financials.forEach(f => {
                // Cash: group by draw dates
                (f.monthlyDraws ? Object.entries(f.monthlyDraws) : []).forEach(([month, amt]) => {
                    if (!monthlyData[month]) monthlyData[month] = { revenue: 0, costs: 0 };
                    monthlyData[month].revenue += amt;
                });
            });

            // For costs, approximate by payroll week dates
            Object.keys(allData).forEach(weekKey => {
                if (!weekKey.match(/^\d{4}-\d{2}-\d{2}$/)) return;
                const weekData = allData[weekKey];
                Object.entries(weekData).forEach(([dayKey, dayData]) => {
                    if (typeof dayData !== 'object') return;
                    const monthKey = dayKey.substring(0, 7);
                    if (!monthlyData[monthKey]) monthlyData[monthKey] = { revenue: 0, costs: 0 };
                    Object.entries(dayData).forEach(([inputId, hours]) => {
                        if (inputId.includes('_eq_')) {
                            const machineKey = inputId.split('_eq_')[1];
                            const machine = machines.find(m => (m.payrollName || m.name).replace(/[^a-zA-Z0-9]/g, '') === machineKey);
                            const rate = machine ? machine.rate : (defaultMachineRates[machineKey] || 0);
                            monthlyData[monthKey].costs += hours * rate;
                        } else {
                            const workerName = inputId.split('_').pop();
                            const rate = getWorkerRate(workerName, null);
                            monthlyData[monthKey].costs += hours * rate;
                        }
                    });
                });
            });

            const months = Object.keys(monthlyData).sort().reverse();
            if (months.length === 0) {
                grid.innerHTML = '<div style="color:var(--text-muted); text-align:center; padding:20px;">No monthly data yet</div>';
                return;
            }

            grid.innerHTML = months.map(month => {
                const d = monthlyData[month];
                const profit = d.revenue - d.costs;
                const monthDate = new Date(month + '-01T00:00:00');
                const monthName = monthDate.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
                const margin = d.revenue > 0 ? ((profit / d.revenue) * 100).toFixed(0) : 0;
                const barPct = d.revenue > 0 ? Math.min((d.costs / d.revenue) * 100, 100) : 0;

                return `
                    <div class="month-card">
                        <div class="month-name">${monthName}</div>
                        <div class="month-revenue">${fmtMoney(d.revenue)}</div>
                        <div class="month-costs">Costs: ${fmtMoney(d.costs)}</div>
                        <div class="month-profit" style="color:${profit >= 0 ? '#16a34a' : '#dc2626'}">
                            ${fmtMoney(profit)} (${margin}%)
                        </div>
                        <div class="profit-bar-container">
                            <div class="profit-bar-bg">
                                <div class="profit-bar-fill" style="width:${barPct}%; background:${profit >= 0 ? '#16a34a' : '#dc2626'};"></div>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ============================================
        // TOGGLE
        // ============================================
        function setBasis(b) {
            basis = b;
            document.getElementById('btnCash').classList.toggle('active', b === 'cash');
            document.getElementById('btnAccrual').classList.toggle('active', b === 'accrual');
            render();
        }

        // ============================================
        // COPY P&L
        // ============================================
        function copyPL() {
            const rows = document.querySelectorAll('#plBody tr');
            let text = `SPENCER'S MASONRY INC.\nPROFIT & LOSS (${basis.toUpperCase()} BASIS)\n${'═'.repeat(45)}\n\n`;
            rows.forEach(row => {
                const cells = row.querySelectorAll('td');
                if (cells.length === 2 && cells[0].textContent) {
                    const label = cells[0].textContent.padEnd(30);
                    const val = cells[1].textContent;
                    text += `${label}${val}\n`;
                } else if (cells.length === 2 && !cells[0].textContent) {
                    text += '\n';
                }
            });
            navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Init
        loadAllData();
    </script>

    <script>
    (function(){
        function initTheme(){
            const s=localStorage.getItem('spencers-theme');
            if(s)document.documentElement.setAttribute('data-theme',s);
            updateIcon();
        }
        window.toggleTheme=function(){
            const c=document.documentElement.getAttribute('data-theme');
            const n=c==='light'?'dark':'light';
            document.documentElement.setAttribute('data-theme',n);
            localStorage.setItem('spencers-theme',n);
            updateIcon();
        };
        function updateIcon(){
            const b=document.getElementById('themeToggle');
            if(b){
                const t=document.documentElement.getAttribute('data-theme');
                b.textContent=t==='light'?'🌙':'☀️';
            }
        }
        initTheme();
    })();
    </script>
</body>
</html>
